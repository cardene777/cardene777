name: Waka Readme

on:
  schedule:
    # 毎日 00:30 UTC = JST 09:30 に実行
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with WakaTime Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        timeout-minutes: 15
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # 重い処理を MAX_REPOS=20 で制限して再有効化
          # (全リポ走査ではなく上位 20 リポに絞ることで 33 分ハングを回避)
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_COMMIT: "True"
          SHOW_LOC_CHART: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_PROFILE_VIEWS: "False"
          # 軽い処理 (WakaTime API のみで完結) は ON 維持
          SHOW_TIMEZONE: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_OS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_UPDATED_DATE: "True"
          COMMIT_BY_ME: "False"
          COMMIT_MESSAGE: ":bar_chart: Update WakaTime stats"
          LOCALE: "en"
          MAX_REPOS: "20"

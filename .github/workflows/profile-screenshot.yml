name: profile-screenshot

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/screenshot-profile.mjs"
      - ".github/workflows/profile-screenshot.yml"

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-save playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Take profile screenshot
        run: node scripts/screenshot-profile.mjs

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-terminal.png
          git diff --quiet --staged || git commit -m ":camera_flash: Refresh profile-terminal.png"
          git push

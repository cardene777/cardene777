<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="50%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style><![CDATA[
      @keyframes blink {
        0%, 50% { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      .prompt {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 22px;
        fill: #4ade80;
      }
      .logo {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 96px;
        font-weight: 800;
        fill: url(#logoGradient);
        filter: url(#glow);
        letter-spacing: 4px;
      }
    ]]></style>
  </defs>

  <text class="prompt" x="120" y="48">$ ./cardene --start</text>

  <text class="logo" x="120" y="140">carden<tspan style="letter-spacing: 0">e</tspan></text>

  <rect class="cursor" x="588" y="68" width="14" height="84" fill="#4ade80" />
</svg>
